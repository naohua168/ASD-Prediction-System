[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=app
    --cov=ml_core
    --cov=tasks
    --cov-report=html:tests/htmlcov
    --cov-report=term-missing
markers =
    slow: 标记耗时较长的测试
    integration: 集成测试
    unit: 单元测试
    e2e: 端到端测试
    requires_db: 需要数据库的测试
    requires_file: 需要真实文件的测试
